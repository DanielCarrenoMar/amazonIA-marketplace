name: Backend Test Ci

on:
  push:
    branches:
      - dev
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-ci-test.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.29.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm --filter backend... install --frozen-lockfile

      - name: Build backend
        run: pnpm --filter backend... build

      - name: Test backend
        run: pnpm --filter backend test:unit
