# docker-compose.yml — AmazonIA Marketplace
# Versión: 1.0 | Monorepo: Turborepo + pnpm
#
# Uso:
#   docker compose up -d                  # Levanta todos los servicios
#   docker compose up iot-simulator -d    # Solo el simulador
#   docker compose logs -f telemetry-worker
#   docker compose down
#
# Variables de entorno:
#   Crea un archivo `.env` en la raíz con los valores reales.
#   NUNCA committees secrets. Usa el archivo .env.compose.example como guía.

services:

  # ══════════════════════════════════════════════════════════════════════════
  # IoT Simulator — Sensor MQTT (cliente saliente a HiveMQ Cloud)
  # ══════════════════════════════════════════════════════════════════════════
  iot-simulator:
    build:
      context: ./apps/iot-simulator          # Standalone: no necesita monorepo raíz
      dockerfile: Dockerfile
    image: amazonia/iot-simulator:latest
    container_name: amazonia-iot-simulator
    restart: unless-stopped
    environment:
      - HIVEMQ_HOST=${HIVEMQ_HOST}
      - HIVEMQ_PORT=${HIVEMQ_PORT:-8883}
      - HIVEMQ_USERNAME=${HIVEMQ_USERNAME}
      - HIVEMQ_PASSWORD=${HIVEMQ_PASSWORD}
    networks:
      - amazonia-internal
    # Sin puertos expuestos: el sensor solo PUBLICA hacia HiveMQ Cloud
    # No tiene endpoints HTTP
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ══════════════════════════════════════════════════════════════════════════
  # MongoDB - Base de datos local para Telemetría y Envíos
  # ══════════════════════════════════════════════════════════════════════════
  mongodb:
    image: mongo:6.0
    container_name: amazonia-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    networks:
      - amazonia-internal
    volumes:
      - mongodb_data:/data/db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ══════════════════════════════════════════════════════════════════════════
  # Ingestor Service — Gateway MQTT → Redis Streams
  # ══════════════════════════════════════════════════════════════════════════
  ingestor-service:
    build:
      context: .                             # Raíz del monorepo (requiere packages/)
      dockerfile: apps/ingestor-service/Dockerfile
    image: amazonia/ingestor-service:latest
    container_name: amazonia-ingestor-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3002
      # HiveMQ Cloud (MQTT broker)
      - HIVEMQ_HOST=${HIVEMQ_HOST}
      - HIVEMQ_PORT=${HIVEMQ_PORT:-8883}
      - HIVEMQ_USERNAME=${INGESTOR_HIVEMQ_USERNAME}
      - HIVEMQ_PASSWORD=${INGESTOR_HIVEMQ_PASSWORD}
      # API Key de autenticación
      - INGESTOR_API_KEY=${INGESTOR_API_KEY}
      # Upstash Redis Streams
      - REDIS_URL=${REDIS_URL}
      - REDIS_TOKEN=${REDIS_TOKEN}
    ports:
      - "3002:3002"                          # Solo para health checks desde el host
    networks:
      - amazonia-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ══════════════════════════════════════════════════════════════════════════
  # Telemetry Worker — Redis Streams → MongoDB Atlas
  # ══════════════════════════════════════════════════════════════════════════
  telemetry-worker:
    build:
      context: .                             # Raíz del monorepo (requiere packages/)
      dockerfile: apps/telemetry-worker/Dockerfile
    image: amazonia/telemetry-worker:latest
    container_name: amazonia-telemetry-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3003
      # Upstash Redis Streams
      - REDIS_URL=${REDIS_URL}
      - REDIS_TOKEN=${REDIS_TOKEN}
      # MongoDB Atlas
      - MONGODB_URI=${MONGODB_URI}
      # Configuración del worker
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-30000}
    ports:
      - "3003:3003"                          # Solo para health checks desde el host
    networks:
      - amazonia-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ══════════════════════════════════════════════════════════════════════════
  # Inference Service — AI Logistics Risk (FastAPI + XGBoost)
  # ══════════════════════════════════════════════════════════════════════════
  inference-service:
    build:
      context: ./apps/inference-service
      dockerfile: Dockerfile
    image: amazonia/inference-service:latest
    container_name: amazonia-inference-service
    restart: unless-stopped
    environment:
      - REDIS_URL=${REDIS_URL}
      - REDIS_TOKEN=${REDIS_TOKEN}
      - MONGODB_URL=${MONGODB_URI}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET_KEY=${JWT_SECRET}
    ports:
      - "8000:8000"
    networks:
      - amazonia-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ══════════════════════════════════════════════════════════════════════════
  # API Principal
  # ══════════════════════════════════════════════════════════════════════════
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: amazonia/api:latest
    container_name: amazonia-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=${REDIS_URL}
      - REDIS_TOKEN=${REDIS_TOKEN}
      - NOTARY_API_KEY=${NOTARY_API_KEY}
      - NOTARY_SERVICE_URL=http://blockchain-notary:3004/api/v1
      - WEBHOOK_BASE_URL=http://api:3001/api
      - CB_FAILURE_THRESHOLD=${CB_FAILURE_THRESHOLD:-3}
      - CB_COOLDOWN_MS=${CB_COOLDOWN_MS:-30000}
      - MONGODB_TIMEOUT_MS=${MONGODB_TIMEOUT_MS:-5000}
    ports:
      - "3001:3001"
    networks:
      - amazonia-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ══════════════════════════════════════════════════════════════════════════
  # Blockchain Notary
  # ══════════════════════════════════════════════════════════════════════════
  blockchain-notary:
    build:
      context: .
      dockerfile: apps/blockchain-notary/Dockerfile
    image: amazonia/blockchain-notary:latest
    container_name: amazonia-blockchain-notary
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3004
      - DATABASE_URL=${NOTARY_DATABASE_URL}
      - RPC_URL=${RPC_URL}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS}
      - API_KEY=${NOTARY_API_KEY}
      - NETWORK_NAME=${NETWORK_NAME:-arbitrum}
      - WEBHOOK_BASE_URL=http://api:3001/api
    ports:
      - "3004:3004"
    networks:
      - amazonia-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

# ══════════════════════════════════════════════════════════════════════════════
# Redes y Volúmenes
# ══════════════════════════════════════════════════════════════════════════════
networks:
  amazonia-internal:
    driver: bridge
    name: amazonia-network

volumes:
  mongodb_data:
    name: amazonia-mongodb-data
